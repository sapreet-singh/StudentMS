<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <mat-icon>school</mat-icon>
    </div>
    <h1 class="auth-title">Student Management</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <mat-icon matPrefix>person</mat-icon>
        <input matInput formControlName="username" placeholder="Enter username" autocomplete="username" />
        <mat-error>{{ getError('username') }}</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password"
               placeholder="Enter password" autocomplete="current-password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error>{{ getError('password') }}</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="loading">
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
        <span *ngIf="!loading">Sign In</span>
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Register</a>
    </p>

    <div class="default-creds">
      <strong>Default Admin:</strong> admin / Admin&#64;123
    </div>
  </div>
</div>
